<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FFB366 0%, #FFA500 50%, #FF8C42 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* Mountain background effect */
    body::before {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 300px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300"><path d="M0,200 L150,100 L300,150 L450,80 L600,120 L750,60 L900,140 L1050,100 L1200,180 L1200,300 L0,300" fill="%236B5B5B" opacity="0.6"/><path d="M0,220 L200,140 L400,180 L600,100 L800,160 L1000,120 L1200,200 L1200,300 L0,300" fill="%23696969" opacity="0.4"/></svg>') repeat-x bottom;
      background-size: auto 100%;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      color: white;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    .search-box input {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      width: 250px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
    }

    .search-box button {
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      border: 2px solid white;
    }

    .search-box button:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .main-weather {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 40px;
      color: white;
      margin-bottom: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .weather-left {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .weather-icon {
      font-size: 80px;
    }

    .weather-info h1 {
      font-size: 72px;
      margin: 0;
      font-weight: 300;
      line-height: 1;
    }

    .weather-info p {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .detail-item .label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-item .value {
      font-size: 24px;
      font-weight: bold;
    }

    .forecast-section h2 {
      color: white;
      margin-bottom: 20px;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 15px;
    }

    .forecast-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: white;
      transition: transform 0.3s, background 0.3s;
    }

    .forecast-card:hover {
      transform: translateY(-10px);
      background: rgba(255, 255, 255, 0.25);
    }

    .forecast-card .day {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .forecast-card .icon {
      font-size: 40px;
      margin: 10px 0;
    }

    .forecast-card .temp {
      font-size: 18px;
      margin: 10px 0;
    }

    .forecast-card .condition {
      font-size: 12px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .main-weather {
        grid-template-columns: 1fr;
      }

      .weather-info h1 {
        font-size: 48px;
      }

      .forecast {
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">SYNOPTIC</div>
      <div class="search-box">
        <input type="text" id="city" placeholder="Search location" value="Paris">
        <button onclick="getWeather()">Search</button>
      </div>
    </div>

    <div class="main-weather">
      <div class="weather-left">
        <div class="weather-icon" id="mainIcon">🌤️</div>
        <div class="weather-info">
          <h1 id="temp">+22°C</h1>
          <p id="location">Paris, France</p>
          <p id="description">Partly cloudy</p>
          <p id="date" style="font-size: 14px; margin-top: 15px;"></p>
        </div>
      </div>

      <div class="weather-details">
        <div class="detail-item">
          <div class="label">Feels Like</div>
          <div class="value" id="feelsLike">20°C</div>
        </div>
        <div class="detail-item">
          <div class="label">Humidity</div>
          <div class="value" id="humidity">65%</div>
        </div>
        <div class="detail-item">
          <div class="label">Wind Speed</div>
          <div class="value" id="windSpeed">12 km/h</div>
        </div>
        <div class="detail-item">
          <div class="label">Pressure</div>
          <div class="value" id="pressure">1013 mb</div>
        </div>
      </div>
    </div>

    <div class="forecast-section">
      <h2>7-Day Forecast</h2>
      <div class="forecast" id="forecast"></div>
    </div>
  </div>

  <script>
    // Mock weather data
    const mockData = {
      "Paris": {
        name: "Paris",
        country: "France",
        temp: 22,
        feelsLike: 20,
        description: "Partly cloudy",
        humidity: 65,
        windSpeed: 12,
        pressure: 1013,
        icon: "🌤️",
        forecast: [
          { day: "Friday", temp: 22, icon: "🌤️", condition: "Sunny" },
          { day: "Saturday", temp: 19, icon: "☁️", condition: "Cloudy" },
          { day: "Sunday", temp: 18, icon: "🌧️", condition: "Rainy" },
          { day: "Monday", temp: 21, icon: "🌤️", condition: "Sunny" },
          { day: "Tuesday", temp: 23, icon: "☀️", condition: "Hot" },
          { day: "Wednesday", temp: 20, icon: "☁️", condition: "Cloudy" },
          { day: "Thursday", temp: 19, icon: "🌧️", condition: "Rainy" }
        ]
      },
      "London": {
        name: "London",
        country: "UK",
        temp: 18,
        feelsLike: 16,
        description: "Rainy",
        humidity: 75,
        windSpeed: 15,
        pressure: 1010,
        icon: "🌧️",
        forecast: [
          { day: "Friday", temp: 18, icon: "🌧️", condition: "Rainy" },
          { day: "Saturday", temp: 17, icon: "☁️", condition: "Cloudy" },
          { day: "Sunday", temp: 19, icon: "🌤️", condition: "Sunny" },
          { day: "Monday", temp: 20, icon: "☀️", condition: "Hot" },
          { day: "Tuesday", temp: 19, icon: "☁️", condition: "Cloudy" },
          { day: "Wednesday", temp: 18, icon: "🌧️", condition: "Rainy" },
          { day: "Thursday", temp: 17, icon: "☁️", condition: "Cloudy" }
        ]
      },
      "New York": {
        name: "New York",
        country: "USA",
        temp: 25,
        feelsLike: 24,
        description: "Sunny",
        humidity: 55,
        windSpeed: 10,
        pressure: 1012,
        icon: "☀️",
        forecast: [
          { day: "Friday", temp: 25, icon: "☀️", condition: "Sunny" },
          { day: "Saturday", temp: 26, icon: "☀️", condition: "Hot" },
          { day: "Sunday", temp: 24, icon: "🌤️", condition: "Sunny" },
          { day: "Monday", temp: 23, icon: "☁️", condition: "Cloudy" },
          { day: "Tuesday", temp: 22, icon: "🌧️", condition: "Rainy" },
          { day: "Wednesday", temp: 24, icon: "🌤️", condition: "Sunny" },
          { day: "Thursday", temp: 25, icon: "☀️", condition: "Hot" }
        ]
      },
      "Tokyo": {
        name: "Tokyo",
        country: "Japan",
        temp: 28,
        feelsLike: 30,
        description: "Hot and humid",
        humidity: 80,
        windSpeed: 8,
        pressure: 1008,
        icon: "🌞",
        forecast: [
          { day: "Friday", temp: 28, icon: "🌞", condition: "Hot" },
          { day: "Saturday", temp: 29, icon: "🌞", condition: "Hot" },
          { day: "Sunday", temp: 27, icon: "🌤️", condition: "Sunny" },
          { day: "Monday", temp: 26, icon: "☁️", condition: "Cloudy" },
          { day: "Tuesday", temp: 25, icon: "🌧️", condition: "Rainy" },
          { day: "Wednesday", temp: 26, icon: "🌤️", condition: "Sunny" },
          { day: "Thursday", temp: 28, icon: "🌞", condition: "Hot" }
        ]
      }
    };

    function displayWeather(cityName) {
      const data = mockData[cityName];
      
      if (!data) {
        alert("City not found in our data. Try: Paris, London, New York, or Tokyo");
        return;
      }

      // Update main weather
      document.getElementById("mainIcon").textContent = data.icon;
      document.getElementById("temp").textContent = `+${data.temp}°C`;
      document.getElementById("location").textContent = `${data.name}, ${data.country}`;
      document.getElementById("description").textContent = data.description;
      
      // Update date
      const today = new Date();
      const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById("date").textContent = dateStr;

      // Update details
      document.getElementById("feelsLike").textContent = `${data.feelsLike}°C`;
      document.getElementById("humidity").textContent = `${data.humidity}%`;
      document.getElementById("windSpeed").textContent = `${data.windSpeed} km/h`;
      document.getElementById("pressure").textContent = `${data.pressure} mb`;

      // Update forecast
      const forecastDiv = document.getElementById("forecast");
      forecastDiv.innerHTML = data.forecast.map(day => `
        <div class="forecast-card">
          <div class="day">${day.day}</div>
          <div class="icon">${day.icon}</div>
          <div class="temp">${day.temp}°C</div>
          <div class="condition">${day.condition}</div>
        </div>
      `).join('');
    }

    function getWeather() {
      const city = document.getElementById("city").value.trim();
      if (city) {
        displayWeather(city);
      }
    }

    // Load default weather on page load
    window.addEventListener('load', () => {
      displayWeather('Paris');
    });

    // Allow Enter key to search
    document.getElementById("city").addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        getWeather();
      }
    });
  </script>
</body>
</html>
